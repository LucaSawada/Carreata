<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carreata Fasipe</title>
</head>

<body>
    <h1>Carreata Fasipe</h1>
    <form id="formAluno" style="display: flex; flex-direction: column; gap: 10px; max-width: 100px;">
    <input type="text" name="nome" placeholder="Nome">
    <input type="email" name="email" placeholder="E-mail">
    <input type="text" name="curso" placeholder="Curso">
    <input type="text" name="matricula" placeholder="Matrícula">
    <input type="tel" name="celular" placeholder="Celular">

    <button id="botao" type="button">Salvar</button>
</form>


<div id="modalLocalizacao" style="display:none;">
    <p>Autoriza Localização?</p>
    <button onclick="autorizarLocalizacao()">Sim</button>
    <button onclick="negarLocalizacao()">Não</button>
</div>

<div id="timer" style="display: none;" class="timer-container">
        <div id="countdown">02:00:00</div>
        <div class="time-label">Time Remaining</div>
    </div>

<div id="confirmacao" style="display:none;">
    <h2>Parabéns! </h2>
    <p>Você recebeu 1 ponto!</p>
</div>


<script src="CarreataFasipe.js"></script>  
</body>
</html>
