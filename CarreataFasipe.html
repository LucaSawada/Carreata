<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="CarreataFasipe.css" rel="stylesheet">
    <title>Carreata Fasipe</title>
</head>

<body>
    <div class="page-logo top-logo">
        <img src="CarreataFasipe.png" alt="Logo Fasipe">
    </div>
    <h1>Carreata Fasipe</h1>
    <form id="formAluno">
    <input type="text" name="nome" placeholder="Nome">
    <input type="email" name="email" placeholder="E-mail">
    <select name="curso" id="curso">
        <option select disable hidden>Cursos</option>
        <option>Analise e desenvolvimento de sistemas</option>
        <option>Biomedicina</option>
        <option>Direito</option>
        <option>Psicologia</option>
        <option>Estetica e Cosmeticos</option>
        <option>Enfermagem</option>
        <option>Fisioterapia</option>
        <option>Odontologia</option>
        <option>Ciencias Contaveis</option>
    </select>
    <input type="text" name="matricula" placeholder="Matrícula">
    <input type="tel" name="celular" placeholder="Celular">

    <button id="botao" type="button">Próximo</button>
</form>


<div id="modalLocalizacao" style="display:none;">
    <p>Autoriza Localização?</p>
    <button onclick="autorizarLocalizacao()">Sim</button>
    <button onclick="negarLocalizacao()">Não</button>
</div>

<div id="timer" style="display: none;" class="timer-container">
        <div id="countdown">02:00:00</div>
        <div class="time-label">Time Remaining</div>
    </div>

<div id="confirmacao" style="display:none;">
    <h2>Parabéns! </h2>
    <p>Você recebeu 1 ponto!</p>
</div>


<script src="CarreataFasipe.js"></script>
    <footer class="page-footer">
        <img src="CarreataFasipe.png" alt="Logo Fasipe">
    </footer>
</body>
</html>
